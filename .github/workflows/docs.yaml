name: Docs

on:
  push:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml
  pull_request:
    branches: [main]
    paths:
      - docs/**
      - mkdocs.yml

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build docs
        run: docker compose -f docker-compose.docs.yml run --rm mkdocs build --strict

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/deploy-pages@v4
