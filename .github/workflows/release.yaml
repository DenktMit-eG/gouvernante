name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build binaries
        run: make build

      - name: Generate checksums
        run: |
          cd dist/binaries
          sha256sum * > SHA256SUMS

      - name: Import GPG key
        run: |
          echo "${{ secrets.MAVEN_GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign checksums
        run: |
          gpg --batch --yes --passphrase "${{ secrets.MAVEN_GPG_PASSPHRASE }}" \
            --pinentry-mode loopback \
            --detach-sign --armor \
            dist/binaries/SHA256SUMS

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/binaries/*
