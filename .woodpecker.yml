when:
  - event: [push, pull_request, tag]

steps:
  test:
    image: golang:1.22
    commands:
      - go vet ./...
      - go test -race -count=1 ./...

  lint:
    image: golangci/golangci-lint:v2.11
    commands:
      - golangci-lint run ./...

  build:
    image: golang:1.22
    commands:
      - make build

  release:
    image: woodpeckerci/plugin-gitea-release
    when:
      - event: tag
    settings:
      base_url: https://codeberg.org
      files:
        - dist/binaries/*
      api_key:
        from_secret: codeberg_token
      title: ${CI_COMMIT_TAG}
